<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Entry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style3.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='image2.jfif') }}"> CARE College of Engineering 
        </div>
        <nav>
            <ul type="none">
                <li><a href="home.html">Home</a></li>
                <li><a href="studentList.html">Students List</a></li>
                <li><a href="student.html">Add Students</a></li>
                <li><a href="studentEntry.html">Attendance Entry</a></li>
                <li><button class="search-btn"><i class="fas fa-search"></i></button></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Attendance Entry</h1>
        
        <div class="form-card">
            <form id="attendanceForm">
                <div class="form-group">
                    <label>Student ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="studentId" placeholder="Enter valid student ID" required>
                        <i class="fas fa-search"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <div class="input-wrapper">
                        <input type="date" id="attendanceDate" required>
                    </div>
                </div>

                <div class="time-row">
                    <div class="form-group">
                        <label>Check-in Time</label>
                        <div class="input-wrapper">
                            <input type="time" id="checkIn" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Check-out Time</label>
                        <div class="input-wrapper">
                            <input type="time" id="checkOut" required>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-save">Save Attendance</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>
            
    </main>
    <script>
        document.getElementById('attendanceDate').valueAsDate = new Date();
        
        const form = document.getElementById('attendanceForm');
        
        form.addEventListener('submit', async function(e){
            e.preventDefault();
        
            const data = {
                id: document.getElementById('studentId').value.trim(),
                date: document.getElementById('attendanceDate').value,
                in: document.getElementById('checkIn').value,
                out: document.getElementById('checkOut').value
            };
            if (!data.id || !data.date || !data.in || !data.out) {
                alert("Please fill all fields.");
                return;
            }
        
            if (data.out <= data.in) {
                alert("Check-out time must be after check-in time.");
                return;
            }
        
            try {
                const response = await fetch('/api/mark_attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
        
                const result = await response.json();
        
                if (response.ok) {
                    alert(result.message || "Attendance saved successfully!");
                    form.reset();
                    document.getElementById('attendanceDate').valueAsDate = new Date();
                } else {
                    alert(result.error || "Error saving attendance.");
                }
        
            } catch (error) {
                console.error("Error:", error);
                alert("Server error. Please try again.");
            }
        });
        </script>
        
</body>
</html>
